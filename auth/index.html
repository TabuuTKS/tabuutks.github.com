<!DOCTYPE html>
<html>
<head>
    <title>Auth Redirect</title>
    <script>
        // Get query params from Google
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        if (code) {
            // Redirect to your app
            window.location.href = "rang://auth?code=" + code;
        } else {
            document.body.innerText = "No code found.";
        }
    </script>
</head>
<body>
Redirecting...
</body>
</html>
